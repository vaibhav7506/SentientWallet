services:
  # Node.js Backend Service
  - type: web
    name: sentientwallet-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: sentientwallet-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TENDERLY_API_KEY
        sync: false
      - key: TENDERLY_ACCOUNT_ID
        sync: false
      - key: TENDERLY_PROJECT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PYTHON_AI_URL
        value: https://sentientwallet-ai.onrender.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: sentientwallet-redis
          property: connectionString
    autoDeploy: true

  # Python AI Engine Service
  - type: web
    name: sentientwallet-ai
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: ALCHEMY_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        sync: false
    autoDeploy: true

  # PostgreSQL Database
databases:
  - name: sentientwallet-db
    plan: starter
    databaseName: sentientwallet
    user: sentientwallet_user
    region: oregon

  # Redis Cache (Optional but recommended for production)
  - name: sentientwallet-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    region: oregon
