version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sentientwallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentientwallet
      POSTGRES_PASSWORD: sentientwallet_dev
      POSTGRES_DB: sentientwallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentientwallet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sentientwallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentientwallet-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://sentientwallet:sentientwallet_dev@postgres:5432/sentientwallet
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      PYTHON_AI_URL: http://ai-engine:8000
      # Add your API keys here or use .env file
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TENDERLY_API_KEY: ${TENDERLY_API_KEY}
      JWT_SECRET: dev_jwt_secret_change_in_production
      SESSION_SECRET: dev_session_secret_change_in_production
      ENCRYPTION_KEY: dev_encryption_key_32_characters
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # AI Engine (Python)
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: sentientwallet-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHON_ENV: development
      HOST: 0.0.0.0
      PORT: 8000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-1.5-pro
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY}
      LOG_LEVEL: info
      DEBUG: true
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      PERCEPTION_INTERVAL_SECONDS: 300
    volumes:
      - ./ai-engine:/app
      - /app/venv
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Next.js) - Optional for full stack development
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sentientwallet-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_ALCHEMY_API_KEY: ${ALCHEMY_API_KEY}
      NEXT_PUBLIC_CHAIN_ID: 1
      NEXT_PUBLIC_ENABLE_VOICE: true
      NEXT_PUBLIC_ENABLE_AUTONOMOUS_MODE: true
      NEXT_PUBLIC_ENABLE_3D_ASSETS: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

  # Prisma Studio (Database GUI)
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentientwallet-prisma-studio
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://sentientwallet:sentientwallet_dev@postgres:5432/sentientwallet
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma studio --port 5555
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: sentientwallet-network
